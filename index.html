<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breve Deleite - Controle</title>
    <link rel="icon" href="favicao.png" type="image/png">
    <style>
        :root { 
            --primary: #FBBF24; --success: #4ADE80; --bg: #823B28; 
            --surface: #9B4630; --text: #FFF0C9; --border: #6B291A; 
            --edit: #38BDF8; --delete: #FCA5A5; --waste: #ef4444;
        }
        body { font-family: system-ui, -apple-system, sans-serif; margin: 0; padding: 20px; background: var(--bg); color: var(--text); }
        .container { max-width: 900px; margin: auto; background: var(--surface); padding: 25px; border-radius: 12px; box-shadow: 0 10px 20px -5px rgba(0,0,0,0.4); }
        .header-logo { text-align: center; margin-bottom: 25px; }
        .header-logo img { width: 250px; height: auto; display: block; margin: 0 auto; }
        .header-logo h2 { margin: 10px 0 0; font-size: 16px; letter-spacing: 4px; font-weight: bold; }
        .tabs { display: flex; gap: 8px; margin-bottom: 25px; border-bottom: 2px solid var(--border); padding-bottom: 10px; overflow-x: auto; }
        .tab { padding: 10px 18px; cursor: pointer; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; font-weight: 600; color: var(--text); }
        .tab.active { background: var(--primary); color: var(--bg); }
        .section { display: none; }
        .section.active { display: block; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; margin-bottom: 20px; background: rgba(0,0,0,0.15); padding: 15px; border-radius: 8px; border: 1px solid var(--border); }
        .form-group { display: flex; flex-direction: column; gap: 4px; }
        label { font-size: 12px; font-weight: bold; opacity: 0.7; }
        input, select { padding: 10px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--text); }
        .btn-action { background: var(--success); color: var(--bg); border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; text-transform: uppercase; }
        .table-container { overflow-x: auto; margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; border-bottom: 1px solid var(--border); text-align: left; font-size: 14px; }
        .btn-del { color: var(--delete); background: none; border: none; cursor: pointer; font-size: 16px; }
        .btn-check { background: var(--edit); color: white; margin-bottom: 10px; padding: 8px; border-radius: 4px; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
<div class="container">
    <div class="header-logo"><img src="brevelogo.png" alt="Logo"><h2>CONTROLE</h2></div>
    
    <div class="tabs">
        <button class="tab active" onclick="showTab('produtos', this)">📦 Produtos</button>
        <button class="tab" onclick="showTab('vendas', this)">🛒 Vender</button>
        <button class="tab" onclick="showTab('descarte', this)">🗑️ Descarte</button>
        <button class="tab" onclick="showTab('relatorios', this)">📊 Relatórios</button>
    </div>

    <div id="produtos" class="section active">
        <form id="form-produto" class="form-grid">
            <div class="form-group"><label>Nome</label><input type="text" id="p-nome" required></div>
            <div class="form-group"><label>Custo (R$)</label><input type="number" id="p-custo" step="0.01" required></div>
            <div class="form-group"><label>Preço Sugerido (R$)</label><input type="number" id="p-preco" step="0.01" required></div>
            <div class="form-group"><label>&nbsp;</label><button type="submit" class="btn-action">Salvar</button></div>
        </form>
        <div id="listagem-produtos" class="table-container"></div>
    </div>

    <div id="vendas" class="section">
        <form id="form-venda" class="form-grid">
            <div class="form-group"><label>Data</label><input type="date" id="v-data" required></div>
            <div class="form-group"><label>Produto</label><select id="v-prod" onchange="setPrecoSugerido()" required></select></div>
            <div class="form-group"><label>Qtd</label><input type="number" id="v-qtd" min="1" value="1" required></div>
            <div class="form-group"><label>Preço Venda (R$)</label><input type="number" id="v-preco" step="0.01" required></div>
            <div class="form-group"><label>&nbsp;</label><button type="submit" class="btn-action">Confirmar Venda</button></div>
        </form>
        <div id="listagem-vendas-recente" class="table-container"></div>
    </div>

    <div id="descarte" class="section">
        <h3 style="color:var(--delete)">Registrar Perda</h3>
        <form id="form-descarte" class="form-grid">
            <div class="form-group"><label>Data</label><input type="date" id="d-data" required></div>
            <div class="form-group"><label>Produto</label><select id="d-prod" required></select></div>
            <div class="form-group"><label>Qtd</label><input type="number" id="d-qtd" min="1" value="1" required></div>
            <div class="form-group"><label>&nbsp;</label><button type="submit" class="btn-action" style="background:var(--waste); color:white">Lançar Descarte</button></div>
        </form>
        
        <button class="btn-check" onclick="window.atualizarListaDescarte()">🔎 CARREGAR HISTÓRICO</button>
        <div id="listagem-descartes-recente" class="table-container"></div>
    </div>

    <div id="relatorios" class="section">
        <div class="form-grid">
            <div class="form-group"><label>Início</label><input type="date" id="r-ini"></div>
            <div class="form-group"><label>Fim</label><input type="date" id="r-fim"></div>
            <div class="form-group"><label>&nbsp;</label><button onclick="carregarRelatorio(false)" class="btn-action">Ver Vendas</button></div>
        </div>
        <div id="listagem-vendas" class="table-container"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, orderBy, onSnapshot, deleteDoc, doc, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyB861qyg_6svQUqrd069ZPAfPH6ZRWbBCs", authDomain: "breve-deleite.firebaseapp.com", projectId: "breve-deleite", storageBucket: "breve-deleite.firebasestorage.app", messagingSenderId: "271773334620", appId: "1:271773334620:web:3d50bdc91efda9aa8efa99" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let cacheProdutos = [];
    const fmt = (v) => Number(v).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

    window.showTab = (id, btn) => {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
        if(id === 'vendas' || id === 'descarte') popularSelects();
    };

    onSnapshot(collection(db, "produtos"), (snap) => {
        cacheProdutos = snap.docs.map(d => ({id: d.id, ...d.data()}));
        let h = `<table><thead><tr><th>Produto</th><th>Preço</th><th>Ação</th></tr></thead><tbody>`;
        cacheProdutos.forEach(p => h += `<tr><td>${p.nome}</td><td>${fmt(p.preco)}</td><td><button class="btn-del" onclick="window.removerItem('produtos','${p.id}')">✖</button></td></tr>`);
        document.getElementById('listagem-produtos').innerHTML = h + `</tbody></table>`;
    });

    // FUNÇÃO QUE VOCÊ VAI CLICAR NO BOTÃO PARA TESTAR
    window.atualizarListaDescarte = async () => {
        const snap = await getDocs(query(collection(db, "vendas"), orderBy("timestamp", "desc"), limit(100)));
        let h = `<table><thead><tr><th>Data</th><th>Produto</th><th>Custo Perda</th><th>Ação</th></tr></thead><tbody>`;
        let tem = false;
        snap.forEach(docSnap => {
            const v = docSnap.data();
            // Verifica se é descarte pelo nome ou pelo preço zero
            if (String(v.prodNome).includes("[DESCARTE]") || v.precoUn === 0) {
                tem = true;
                const d = v.data.split('-').reverse().slice(0,2).join('/');
                h += `<tr><td>${d}</td><td>${v.prodNome.replace("[DESCARTE] ", "")}</td><td>${fmt(v.custoUn * v.qtd)}</td><td><button class="btn-del" onclick="window.removerDescarte('${docSnap.id}')">✖</button></td></tr>`;
            }
        });
        document.getElementById('listagem-descartes-recente').innerHTML = tem ? h + "</tbody></table>" : "<p>Nenhum descarte</p>";
    };

    // Vendas Recentes (Automático)
    onSnapshot(query(collection(db, "vendas"), orderBy("timestamp", "desc"), limit(30)), (snap) => {
        let h = `<table><thead><tr><th>Data</th><th>Produto</th><th>Total</th><th>Ação</th></tr></thead><tbody>`;
        let tem = false;
        snap.forEach(d => {
            const v = d.data();
            if (!String(v.prodNome).includes("[DESCARTE]") && v.precoUn > 0) {
                tem = true;
                h += `<tr><td>${v.data.split('-').reverse().slice(0,2).join('/')}</td><td>${v.prodNome}</td><td>${fmt(v.precoUn * v.qtd)}</td><td><button class="btn-del" onclick="window.removerItem('vendas','${d.id}')">✖</button></td></tr>`;
            }
        });
        document.getElementById('listagem-vendas-recente').innerHTML = tem ? h + "</tbody></table>" : "<p>Nenhuma venda recente.</p>";
    });

    function popularSelects() {
        const vS = document.getElementById('v-prod'), dS = document.getElementById('d-prod');
        const opts = '<option value="">Selecione...</option>' + cacheProdutos.map(p => `<option value="${p.id}">${p.nome}</option>`).join('');
        if(vS) vS.innerHTML = opts; if(dS) dS.innerHTML = opts;
        document.getElementById('v-data').valueAsDate = new Date();
        document.getElementById('d-data').valueAsDate = new Date();
    }

    window.setPrecoSugerido = () => {
        const p = cacheProdutos.find(x => x.id === document.getElementById('v-prod').value);
        if(p) document.getElementById('v-preco').value = p.preco;
    };

    document.getElementById('form-produto').onsubmit = async (e) => {
        e.preventDefault();
        await addDoc(collection(db, "produtos"), { nome: document.getElementById('p-nome').value, custo: parseFloat(document.getElementById('p-custo').value), preco: parseFloat(document.getElementById('p-preco').value) });
        e.target.reset();
    };

    document.getElementById('form-venda').onsubmit = async (e) => {
        e.preventDefault();
        const p = cacheProdutos.find(x => x.id === document.getElementById('v-prod').value);
        await addDoc(collection(db, "vendas"), { data: document.getElementById('v-data').value, prodNome: p.nome, custoUn: p.custo, precoUn: parseFloat(document.getElementById('v-preco').value), qtd: parseInt(document.getElementById('v-qtd').value), timestamp: new Date().getTime() });
        e.target.reset();
    };

    document.getElementById('form-descarte').onsubmit = async (e) => {
        e.preventDefault();
        const p = cacheProdutos.find(x => x.id === document.getElementById('d-prod').value);
        await addDoc(collection(db, "vendas"), { data: document.getElementById('d-data').value, prodNome: "[DESCARTE] " + p.nome, custoUn: p.custo, precoUn: 0, qtd: parseInt(document.getElementById('d-qtd').value), timestamp: new Date().getTime() });
        e.target.reset();
        window.atualizarListaDescarte(); // Atualiza na hora
    };

    window.removerItem = async (c, id) => { if(confirm("Excluir?")) await deleteDoc(doc(db, c, id)); };
    window.removerDescarte = async (id) => { if(confirm("Excluir descarte?")) { await deleteDoc(doc(db, 'vendas', id)); window.atualizarListaDescarte(); } };
    window.onload = () => { popularSelects(); };
</script>
</body>
</html>
