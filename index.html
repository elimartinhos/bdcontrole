<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breve Deleite - Controle</title>
    <link rel="icon" href="favicao.png" type="image/png">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --primary: #FBBF24; --success: #4ADE80; --bg: #823B28; 
            --surface: #9B4630; --text: #FFF0C9; --border: #6B291A; 
            --edit: #38BDF8; --delete: #FCA5A5; --waste: #ef4444;
        }
        body { font-family: system-ui, -apple-system, sans-serif; margin: 0; padding: 20px; background: var(--bg); color: var(--text); }
        .container { max-width: 900px; margin: auto; background: var(--surface); padding: 25px; border-radius: 12px; box-shadow: 0 10px 20px -5px rgba(0,0,0,0.4); }
        .header-logo { text-align: center; margin-bottom: 25px; }
        .header-logo img { width: 250px; height: auto; display: block; margin: 0 auto; aspect-ratio: 1033 / 537; object-fit: contain; }
        .header-logo h2 { margin: 10px 0 0; font-size: 16px; letter-spacing: 4px; color: var(--text); opacity: 0.9; font-weight: bold; }
        
        .tabs { display: flex; gap: 8px; margin-bottom: 25px; border-bottom: 2px solid var(--border); padding-bottom: 10px; overflow-x: auto; }
        .tab { padding: 10px 18px; cursor: pointer; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; font-weight: 600; white-space: nowrap; transition: 0.2s; color: var(--text); }
        .tab.active { background: var(--primary); color: var(--bg); border-color: var(--primary); }
        
        .section { display: none; }
        .section.active { display: block; }
        
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; margin-bottom: 20px; background: rgba(0,0,0,0.15); padding: 15px; border-radius: 8px; border: 1px solid var(--border); }
        .form-group { display: flex; flex-direction: column; gap: 4px; }
        label { font-size: 12px; font-weight: bold; color: rgba(255, 240, 201, 0.7); }
        input, select { padding: 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 15px; background: var(--bg); color: var(--text); color-scheme: dark; }
        
        button.btn-action { background: var(--success); color: var(--bg); border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.2s; text-transform: uppercase; }
        
        .table-container { overflow-x: auto; margin-top: 10px; margin-bottom: 30px; }
        table { width: 100%; border-collapse: collapse; background: var(--surface); }
        th, td { padding: 12px; border-bottom: 1px solid var(--border); text-align: left; font-size: 14px; }
        th { background: rgba(0,0,0,0.2); color: var(--text); }
        
        .chart-container { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 8px; margin: 20px 0; display: none; }

        .summary-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin: 20px 0; }
        .card { padding: 15px; background: var(--bg); border-radius: 8px; text-align: center; border: 1px solid var(--border); }
        .card h3 { margin: 0; font-size: 11px; color: rgba(255, 240, 201, 0.7); text-transform: uppercase; }
        .card p { margin: 5px 0 0; font-size: 18px; font-weight: bold; }

        .btn-del { color: var(--delete); background: none; border: none; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header-logo"><img src="brevelogo.png" alt="Logo"><h2>CONTROLE</h2></div>
    
    <div class="tabs">
        <button class="tab active" onclick="showTab('produtos', this)">📦 Produtos</button>
        <button class="tab" onclick="showTab('vendas', this)">🛒 Vender</button>
        <button class="tab" onclick="showTab('descarte', this)">🗑️ Descarte</button>
        <button class="tab" onclick="showTab('relatorios', this)">📊 Relatórios</button>
    </div>

    <div id="produtos" class="section active">
        <h3>Cadastrar Produto</h3>
        <form id="form-produto" class="form-grid">
            <input type="hidden" id="p-id">
            <div class="form-group"><label>Nome</label><input type="text" id="p-nome" required></div>
            <div class="form-group"><label>Custo (R$)</label><input type="number" id="p-custo" step="0.01" required></div>
            <div class="form-group"><label>Preço Sugerido (R$)</label><input type="number" id="p-preco" step="0.01" required></div>
            <div class="form-group"><label>&nbsp;</label><button type="submit" class="btn-action">Salvar</button></div>
        </form>
        <div id="listagem-produtos" class="table-container"></div>
    </div>

    <div id="vendas" class="section">
        <h3>Lançar Venda</h3>
        <form id="form-venda" class="form-grid">
            <div class="form-group"><label>Data</label><input type="date" id="v-data" required></div>
            <div class="form-group"><label>Produto</label><select id="v-prod" onchange="setPrecoSugerido()" required></select></div>
            <div class="form-group"><label>Qtd</label><input type="number" id="v-qtd" min="1" value="1" required></div>
            <div class="form-group"><label>Preço Venda (R$)</label><input type="number" id="v-preco" step="0.01" required></div>
            <div class="form-group"><label>&nbsp;</label><button type="submit" class="btn-action">Confirmar Venda</button></div>
        </form>
        <h3>Vendas Recentes</h3>
        <div id="listagem-vendas-recente" class="table-container"></div>
    </div>

    <div id="descarte" class="section">
        <h3 style="color:var(--delete)">Registrar Descarte (Perda)</h3>
        <form id="form-descarte" class="form-grid">
            <div class="form-group"><label>Data</label><input type="date" id="d-data" required></div>
            <div class="form-group"><label>Produto</label><select id="d-prod" required></select></div>
            <div class="form-group"><label>Qtd</label><input type="number" id="d-qtd" min="1" value="1" required></div>
            <div class="form-group"><label>&nbsp;</label><button type="submit" class="btn-action" style="background:var(--waste); color:white">Lançar Perda</button></div>
        </form>
        <h3>Histórico de Descartes</h3>
        <div id="listagem-descartes-recente" class="table-container"></div>
    </div>

    <div id="relatorios" class="section">
        <div class="form-grid">
            <div class="form-group"><label>Início</label><input type="date" id="r-ini"></div>
            <div class="form-group"><label>Fim</label><input type="date" id="r-fim"></div>
            <div class="form-group"><label>&nbsp;</label><button onclick="carregarRelatorio(false)" class="btn-action">Por Venda</button></div>
            <div class="form-group"><label>&nbsp;</label><button onclick="carregarRelatorio(true)" class="btn-action" style="background:var(--edit)">Por Produto</button></div>
            <div class="form-group"><label>&nbsp;</label><button onclick="carregarRelatorioPico()" class="btn-action" style="background:var(--primary); color:var(--bg)">Pico por Dia</button></div>
        </div>

        <div class="summary-cards">
            <div class="card"><h3>Receita</h3><p id="res-rec">R$ 0,00</p></div>
            <div class="card"><h3>Custo Total</h3><p id="res-cus">R$ 0,00</p></div>
            <div class="card" style="border-top:4px solid var(--success)"><h3>Lucro Líquido</h3><p id="res-luc">R$ 0,00</p></div>
        </div>

        <div id="pico-chart-wrapper" class="chart-container"><canvas id="picoChart"></canvas></div>
        <div id="listagem-vendas" class="table-container"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, orderBy, onSnapshot, deleteDoc, doc, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyB861qyg_6svQUqrd069ZPAfPH6ZRWbBCs", authDomain: "breve-deleite.firebaseapp.com", projectId: "breve-deleite", storageBucket: "breve-deleite.firebasestorage.app", messagingSenderId: "271773334620", appId: "1:271773334620:web:3d50bdc91efda9aa8efa99" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let cacheProdutos = [], meuGrafico = null;
    const fmt = (v) => Number(v).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

    window.showTab = (id, btn) => {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
        if(id === 'vendas' || id === 'descarte') popularSelects();
    };

    onSnapshot(collection(db, "produtos"), (snap) => {
        cacheProdutos = snap.docs.map(d => ({id: d.id, ...d.data()}));
        let html = `<table><thead><tr><th>Produto</th><th>Preço</th><th>Ação</th></tr></thead><tbody>`;
        cacheProdutos.forEach(p => html += `<tr><td>${p.nome}</td><td>${fmt(p.preco)}</td><td><button class="btn-del" onclick="window.removerItem('produtos','${p.id}')">✖</button></td></tr>`);
        document.getElementById('listagem-produtos').innerHTML = html + `</tbody></table>`;
    });

    // ESCUTA ÚNICA PARA TODAS AS VENDAS/DESCARTES (Sincronizado)
    onSnapshot(query(collection(db, "vendas"), orderBy("timestamp", "desc"), limit(40)), (snap) => {
        let rowsV = "", rowsD = "";
        let hasV = false, hasD = false;

        snap.forEach(docSnap => {
            const v = docSnap.data();
            const dataF = v.data.split('-').reverse().slice(0,2).join('/');
            
            // Lógica de separação forçada
            if (v.prodNome.includes("[DESCARTE]") || v.precoUn === 0) {
                hasD = true;
                rowsD += `<tr><td>${dataF}</td><td>${v.prodNome.replace("[DESCARTE] ", "")}</td><td>${fmt(v.custoUn * v.qtd)}</td><td><button class="btn-del" onclick="window.removerItem('vendas','${docSnap.id}')">✖</button></td></tr>`;
            } else {
                hasV = true;
                rowsV += `<tr><td>${dataF}</td><td>${v.prodNome}</td><td>${fmt(v.precoUn * v.qtd)}</td><td><button class="btn-del" onclick="window.removerItem('vendas','${docSnap.id}')">✖</button></td></tr>`;
            }
        });

        document.getElementById('listagem-vendas-recente').innerHTML = hasV ? `<table><thead><tr><th>Data</th><th>Produto</th><th>Total</th><th>Ação</th></tr></thead><tbody>${rowsV}</tbody></table>` : "<p style='padding:10px;opacity:0.6'>Nenhuma venda recente.</p>";
        document.getElementById('listagem-descartes-recente').innerHTML = hasD ? `<table><thead><tr><th>Data</th><th>Produto</th><th>Custo Perda</th><th>Ação</th></tr></thead><tbody>${rowsD}</tbody></table>` : "<p style='padding:10px;opacity:0.6'>Nenhum descarte</p>";
    });

    function popularSelects() {
        const vS = document.getElementById('v-prod'), dS = document.getElementById('d-prod');
        const opts = '<option value="">Selecione...</option>' + cacheProdutos.map(p => `<option value="${p.id}">${p.nome}</option>`).join('');
        if(vS) vS.innerHTML = opts; if(dS) dS.innerHTML = opts;
        document.getElementById('v-data').valueAsDate = new Date();
        document.getElementById('d-data').valueAsDate = new Date();
    }

    window.setPrecoSugerido = () => {
        const p = cacheProdutos.find(x => x.id === document.getElementById('v-prod').value);
        if(p) document.getElementById('v-preco').value = p.preco;
    };

    document.getElementById('form-produto').onsubmit = async (e) => {
        e.preventDefault();
        await addDoc(collection(db, "produtos"), {
            nome: document.getElementById('p-nome').value,
            custo: parseFloat(document.getElementById('p-custo').value),
            preco: parseFloat(document.getElementById('p-preco').value)
        });
        e.target.reset();
    };

    document.getElementById('form-venda').onsubmit = async (e) => {
        e.preventDefault();
        const p = cacheProdutos.find(x => x.id === document.getElementById('v-prod').value);
        await addDoc(collection(db, "vendas"), {
            data: document.getElementById('v-data').value,
            prodNome: p.nome, custoUn: p.custo, precoUn: parseFloat(document.getElementById('v-preco').value),
            qtd: parseInt(document.getElementById('v-qtd').value), timestamp: new Date().getTime()
        });
        e.target.reset(); popularSelects();
    };

    document.getElementById('form-descarte').onsubmit = async (e) => {
        e.preventDefault();
        const p = cacheProdutos.find(x => x.id === document.getElementById('d-prod').value);
        await addDoc(collection(db, "vendas"), {
            data: document.getElementById('d-data').value,
            prodNome: "[DESCARTE] " + p.nome, custoUn: p.custo, precoUn: 0,
            qtd: parseInt(document.getElementById('d-qtd').value), timestamp: new Date().getTime()
        });
        e.target.reset(); popularSelects();
    };

    window.carregarRelatorio = async (agrupar) => {
        document.getElementById('pico-chart-wrapper').style.display = 'none';
        const ini = document.getElementById('r-ini').value, fim = document.getElementById('r-fim').value;
        const snap = await getDocs(query(collection(db, "vendas"), orderBy("data", "desc")));
        let rec = 0, cus = 0, dadosA = {};
        let html = `<table><thead><tr><th>${agrupar ? 'Produto' : 'Data'}</th><th>${agrupar ? 'Qtd' : 'Produto'}</th><th>Total</th><th>Lucro</th></tr></thead><tbody>`;

        snap.forEach(d => {
            const v = d.data();
            if((ini && v.data < ini) || (fim && v.data > fim)) return;
            const tR = v.precoUn * v.qtd, tC = v.custoUn * v.qtd, tL = tR - tC;
            rec += tR; cus += tC;
            if(agrupar) {
                if(!dadosA[v.prodNome]) dadosA[v.prodNome] = { tr:0, tc:0, q:0 };
                dadosA[v.prodNome].tr += tR; dadosA[v.prodNome].tc += tC; dadosA[v.prodNome].q += v.qtd;
            } else {
                html += `<tr><td>${v.data.split('-').reverse().join('/')}</td><td>${v.prodNome}</td><td>${fmt(tR)}</td><td style="color:${tL < 0 ? '#ff8a8a' : '#4ADE80'}">${fmt(tL)}</td></tr>`;
            }
        });
        if(agrupar) {
            Object.keys(dadosA).forEach(n => {
                const d = dadosA[n]; const l = d.tr - d.tc;
                html += `<tr><td>${n}</td><td>${d.q}x</td><td>${fmt(d.tr)}</td><td style="color:${l < 0 ? '#ff8a8a' : '#4ADE80'}">${fmt(l)}</td></tr>`;
            });
        }
        document.getElementById('res-rec').innerText = fmt(rec);
        document.getElementById('res-cus').innerText = fmt(cus);
        document.getElementById('res-luc').innerText = fmt(rec-cus);
        document.getElementById('listagem-vendas').innerHTML = html + "</tbody></table>";
    };

    window.carregarRelatorioPico = async () => {
        document.getElementById('pico-chart-wrapper').style.display = 'block';
        const ini = document.getElementById('r-ini').value, fim = document.getElementById('r-fim').value;
        const snap = await getDocs(collection(db, "vendas"));
        const dias = ["Dom", "Seg", "Ter", "Qua", "Qui", "Sex", "Sáb"];
        const vals = [0,0,0,0,0,0,0];
        let total = 0;
        snap.forEach(d => {
            const v = d.data();
            if((ini && v.data < ini) || (fim && v.data > fim)) return;
            const dia = new Date(v.data + "T00:00:00").getDay();
            vals[dia] += (v.precoUn * v.qtd);
            total += (v.precoUn * v.qtd);
        });
        if(meuGrafico) meuGrafico.destroy();
        meuGrafico = new Chart(document.getElementById('picoChart'), {
            type: 'bar',
            data: { labels: dias, datasets: [{ label: 'Receita', data: vals, backgroundColor: '#FBBF24' }] },
            options: { scales: { y: { beginAtZero: true, ticks: { color: '#FFF0C9' } }, x: { ticks: { color: '#FFF0C9' } } } }
        });
        document.getElementById('res-rec').innerText = fmt(total);
        document.getElementById('listagem-vendas').innerHTML = "";
    };

    window.removerItem = async (c, id) => { if(confirm("Excluir registro?")) await deleteDoc(doc(db, c, id)); };
    window.onload = () => popularSelects();
</script>
</body>
</html>
