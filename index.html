<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breve Deleite - Controle</title>
    <link rel="icon" href="favicao.png" type="image/png">
    <style>
        :root { 
            --primary: #FBBF24; 
            --success: #4ADE80; 
            --bg: #823B28; 
            --surface: #9B4630; 
            --text: #FFF0C9; 
            --border: #6B291A; 
            --edit: #38BDF8; 
            --delete: #FCA5A5;
        }
        body { font-family: system-ui, -apple-system, sans-serif; margin: 0; padding: 20px; background: var(--bg); color: var(--text); }
        .container { max-width: 900px; margin: auto; background: var(--surface); padding: 25px; border-radius: 12px; box-shadow: 0 10px 20px -5px rgba(0,0,0,0.4); }
        
        .header-logo { text-align: center; margin-bottom: 25px; }
        .header-logo img { width: 250px; height: auto; display: block; margin: 0 auto; aspect-ratio: 1033 / 537; object-fit: contain; }
        .header-logo h2 { margin: 10px 0 0; font-size: 16px; letter-spacing: 4px; color: var(--text); opacity: 0.9; font-weight: bold; }

        .tabs { display: flex; gap: 8px; margin-bottom: 25px; border-bottom: 2px solid var(--border); padding-bottom: 10px; overflow-x: auto; }
        .tab { padding: 10px 18px; cursor: pointer; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; font-weight: 600; white-space: nowrap; transition: 0.2s; color: var(--text); }
        .tab.active { background: var(--primary); color: var(--bg); border-color: var(--primary); }
        .section { display: none; }
        .section.active { display: block; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 20px; background: rgba(0,0,0,0.15); padding: 15px; border-radius: 8px; border: 1px solid var(--border); }
        .form-group { display: flex; flex-direction: column; gap: 4px; }
        label { font-size: 12px; font-weight: bold; color: rgba(255, 240, 201, 0.7); }
        input, select { padding: 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 15px; background: var(--bg); color: var(--text); color-scheme: dark; }
        button.btn-action { background: var(--success); color: var(--bg); border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.2s; }
        button.btn-action:hover { opacity: 0.9; }
        .table-container { overflow-x: auto; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; background: var(--surface); }
        th, td { padding: 12px; border-bottom: 1px solid var(--border); text-align: left; font-size: 14px; }
        th { background: rgba(0,0,0,0.2); color: var(--text); }
        .summary-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin: 20px 0; }
        .card { padding: 15px; background: var(--bg); border-radius: 8px; text-align: center; border: 1px solid var(--border); box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .card h3 { margin: 0; font-size: 11px; color: rgba(255, 240, 201, 0.7); text-transform: uppercase; letter-spacing: 1px; }
        .card p { margin: 5px 0 0; font-size: 18px; font-weight: bold; }
        .card.lucro { border-top: 4px solid var(--success); }
        .btn-edit { color: var(--edit); background: none; border: none; cursor: pointer; font-size: 16px; margin-right: 8px; }
        .btn-del { color: var(--delete); background: none; border: none; cursor: pointer; font-size: 16px; }
        .header-list { display: flex; justify-content: space-between; align-items: center; margin-top: 30px; }
        .header-list h3 { margin: 0; }
        
        /* Paginação */
        .pagination { display: flex; justify-content: center; align-items: center; gap: 15px; margin-top: 15px; font-weight: bold; }
        .pagination button { background: var(--border); color: var(--text); border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .pagination button:hover:not(:disabled) { background: var(--primary); color: var(--bg); }
        .pagination button:disabled { opacity: 0.4; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-logo">
        <img src="brevelogo.png" alt="Breve Deleite Logo">
        <h2>CONTROLE</h2>
    </div>
    
    <div class="tabs">
        <button class="tab active" id="tab-prod" onclick="showTab('produtos', this)">📦 Produtos</button>
        <button class="tab" id="tab-vend" onclick="showTab('vendas', this)">🛒 Vender</button>
        <button class="tab" id="tab-rel" onclick="showTab('relatorios', this)">📊 Relatórios</button>
    </div>

    <div id="produtos" class="section active">
        <h3 id="form-title">Cadastrar Produto</h3>
        <form id="form-produto" class="form-grid">
            <input type="hidden" id="p-id">
            <div class="form-group"><label>Nome</label><input type="text" id="p-nome" required></div>
            <div class="form-group"><label>Custo (R$)</label><input type="number" id="p-custo" step="0.01" required></div>
            <div class="form-group"><label>Preço Sugerido (R$)</label><input type="number" id="p-preco" step="0.01" required></div>
            <div class="form-group"><label>&nbsp;</label><button type="submit" id="btn-salvar-prod" class="btn-action">Salvar</button></div>
        </form>
        <div id="listagem-produtos" class="table-container"></div>
    </div>

    <div id="vendas" class="section">
        <h3>Lançar Venda</h3>
        <form id="form-venda" class="form-grid">
            <div class="form-group"><label>Data</label><input type="date" id="v-data" required></div>
            <div class="form-group"><label>Produto</label><select id="v-prod" onchange="setPrecoSugerido()" required><option value="">Carregando...</option></select></div>
            <div class="form-group"><label>Qtd</label><input type="number" id="v-qtd" min="1" value="1" required></div>
            <div class="form-group"><label>Preço Venda (R$)</label><input type="number" id="v-preco" step="0.01" required></div>
            <div class="form-group"><label>&nbsp;</label><button type="submit" class="btn-action">Confirmar Venda</button></div>
        </form>

        <div class="header-list">
            <h3>Histórico Recente</h3>
            <div style="font-size: 14px;">
                Mostrar: 
                <select id="v-limite" onchange="window.escutarVendas()" style="padding: 5px; font-size: 14px;">
                    <option value="25">25 vendas</option>
                    <option value="50">50 vendas</option>
                    <option value="100">100 vendas</option>
                </select>
            </div>
        </div>
        <div id="listagem-vendas-recente" class="table-container"></div>
        <div class="pagination">
            <button id="btn-prev" onclick="mudarPagina(-1)">Anterior</button>
            <span>Página <span id="pag-atual">1</span></span>
            <button id="btn-next" onclick="mudarPagina(1)">Próxima</button>
        </div>
    </div>

    <div id="relatorios" class="section">
        <div class="form-grid" style="align-items: end;">
            <div class="form-group"><label>De:</label><input type="date" id="r-ini"></div>
            <div class="form-group"><label>Até:</label><input type="date" id="r-fim"></div>
            <button onclick="carregarRelatorio(false)" class="btn-action" style="background:var(--primary); color:var(--bg);">Por Venda</button>
            <button onclick="carregarRelatorio(true)" class="btn-action" style="background:var(--edit); color:var(--bg);">Por Produto</button>
        </div>
        <div class="summary-cards">
            <div class="card"><h3>Receita</h3><p id="res-rec">R$ 0,00</p></div>
            <div class="card"><h3>Custo Total</h3><p id="res-cus">R$ 0,00</p></div>
            <div class="card lucro"><h3>Lucro Líquido</h3><p id="res-luc" style="color:var(--success)">R$ 0,00</p></div>
        </div>
        <div id="listagem-vendas" class="table-container"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, orderBy, onSnapshot, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB861qyg_6svQUqrd069ZPAfPH6ZRWbBCs",
        authDomain: "breve-deleite.firebaseapp.com",
        projectId: "breve-deleite",
        storageBucket: "breve-deleite.firebasestorage.app",
        messagingSenderId: "271773334620",
        appId: "1:271773334620:web:3d50bdc91efda9aa8efa99",
        measurementId: "G-LZQMJG74D0"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let cacheProdutos = [];
    let unsubscribeVendas = null;
    let todasVendasCache = [];
    let paginaAtual = 0;

    window.showTab = (tabId, btn) => {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        btn.classList.add('active');
        
        if(tabId === 'vendas') {
            popularSelect();
            window.escutarVendas(); 
        }
    };

    const fmt = (v) => Number(v).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

    document.getElementById('form-produto').onsubmit = async (e) => {
        e.preventDefault();
        const id = document.getElementById('p-id').value;
        const dados = {
            nome: document.getElementById('p-nome').value,
            custo: parseFloat(document.getElementById('p-custo').value),
            preco: parseFloat(document.getElementById('p-preco').value)
        };
        if (id) {
            await updateDoc(doc(db, "produtos", id), dados);
            document.getElementById('p-id').value = "";
            document.getElementById('form-title').innerText = "Cadastrar Produto";
        } else {
            await addDoc(collection(db, "produtos"), dados);
        }
        e.target.reset();
    };

    window.editarProduto = (id) => {
        const p = cacheProdutos.find(x => x.id === id);
        if(p) {
            document.getElementById('p-id').value = p.id;
            document.getElementById('p-nome').value = p.nome;
            document.getElementById('p-custo').value = p.custo;
            document.getElementById('p-preco').value = p.preco;
            document.getElementById('form-title').innerText = "Editando: " + p.nome;
            window.scrollTo(0,0);
        }
    };

    onSnapshot(collection(db, "produtos"), (snap) => {
        cacheProdutos = snap.docs.map(d => ({id: d.id, ...d.data()}));
        let html = `<table><thead><tr><th>Produto</th><th>Custo</th><th>Preço</th><th>Ações</th></tr></thead><tbody>`;
        cacheProdutos.forEach(p => {
            html += `<tr><td>${p.nome}</td><td>${fmt(p.custo)}</td><td>${fmt(p.preco)}</td>
            <td>
                <button class="btn-edit" onclick="window.editarProduto('${p.id}')">✏️</button>
                <button class="btn-del" onclick="window.removerItem('produtos','${p.id}')">✖</button>
            </td></tr>`;
        });
        document.getElementById('listagem-produtos').innerHTML = html + `</tbody></table>`;
    });

    function popularSelect() {
        const sel = document.getElementById('v-prod');
        sel.innerHTML = '<option value="">Selecione...</option>';
        cacheProdutos.forEach(p => sel.innerHTML += `<option value="${p.id}">${p.nome}</option>`);
        
        const dataSalva = sessionStorage.getItem('ultimaDataVenda');
        if (dataSalva) {
            document.getElementById('v-data').value = dataSalva;
        } else {
            document.getElementById('v-data').valueAsDate = new Date();
        }
    }

    window.setPrecoSugerido = () => {
        const p = cacheProdutos.find(x => x.id === document.getElementById('v-prod').value);
        if(p) document.getElementById('v-preco').value = p.preco;
    };

    document.getElementById('form-venda').onsubmit = async (e) => {
        e.preventDefault();
        const p = cacheProdutos.find(x => x.id === document.getElementById('v-prod').value);
        
        const dataSelecionada = document.getElementById('v-data').value;
        sessionStorage.setItem('ultimaDataVenda', dataSelecionada);

        const v = {
            data: dataSelecionada,
            prodNome: p.nome,
            custoUn: p.custo,
            precoUn: parseFloat(document.getElementById('v-preco').value),
            qtd: parseInt(document.getElementById('v-qtd').value),
            timestamp: new Date().getTime() 
        };
        await addDoc(collection(db, "vendas"), v);
        e.target.reset();
        popularSelect(); 
    };

    window.escutarVendas = () => {
        if(unsubscribeVendas) unsubscribeVendas();
        paginaAtual = 0;
        
        const q = query(collection(db, "vendas"), orderBy("data", "desc"));
        unsubscribeVendas = onSnapshot(q, (snap) => {
            todasVendasCache = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            // Ordenação secundária por timestamp para manter coerência caso a data seja igual
            todasVendasCache.sort((a, b) => b.data.localeCompare(a.data) || (b.timestamp || 0) - (a.timestamp || 0));
            renderizarTabelaVendas();
        });
    };

    window.mudarPagina = (dir) => {
        paginaAtual += dir;
        renderizarTabelaVendas();
    };

    function renderizarTabelaVendas() {
        const limite = parseInt(document.getElementById('v-limite').value);
        const inicio = paginaAtual * limite;
        const fim = inicio + limite;
        const itensPagina = todasVendasCache.slice(inicio, fim);

        document.getElementById('btn-prev').disabled = paginaAtual === 0;
        document.getElementById('btn-next').disabled = fim >= todasVendasCache.length;
        document.getElementById('pag-atual').innerText = paginaAtual + 1;

        let html = `<table><thead><tr><th>Data</th><th>Produto</th><th>Qtd</th><th>Total</th><th>Ação</th></tr></thead><tbody>`;
        if (itensPagina.length === 0) {
            html += `<tr><td colspan="5" style="text-align:center">Nenhuma venda encontrada.</td></tr>`;
        }
        itensPagina.forEach(v => {
            const total = v.precoUn * v.qtd;
            const dataFormatada = v.data ? v.data.split('-').reverse().join('/') : '---';
            html += `<tr>
                <td>${dataFormatada}</td>
                <td>${v.prodNome}</td>
                <td>${v.qtd}</td>
                <td>${fmt(total)}</td>
                <td><button class="btn-del" onclick="window.removerItem('vendas','${v.id}')">✖</button></td>
            </tr>`;
        });
        document.getElementById('listagem-vendas-recente').innerHTML = html + `</tbody></table>`;
    }

    window.carregarRelatorio = async (agrupar) => {
        const ini = document.getElementById('r-ini').value;
        const fim = document.getElementById('r-fim').value;
        const q = query(collection(db, "vendas"), orderBy("data", "desc"));
        const snap = await getDocs(q);
        
        let rec = 0, cus = 0;
        let html = "";

        if (agrupar) {
            let dadosProd = {};
            snap.forEach(doc => {
                const v = doc.data();
                if((ini && v.data < ini) || (fim && v.data > fim)) return;

                const tRec = v.precoUn * v.qtd;
                const tCus = v.custoUn * v.qtd;
                rec += tRec; cus += tCus;

                if(!dadosProd[v.prodNome]) dadosProd[v.prodNome] = { qtd: 0, rec: 0, luc: 0 };
                dadosProd[v.prodNome].qtd += v.qtd;
                dadosProd[v.prodNome].rec += tRec;
                dadosProd[v.prodNome].luc += (tRec - tCus);
            });

            html = `<table><thead><tr><th>Produto</th><th>Qtd Vendida</th><th>Total Receita</th><th>Lucro</th></tr></thead><tbody>`;
            for (let p in dadosProd) {
                const d = dadosProd[p];
                html += `<tr>
                    <td>${p}</td>
                    <td>${d.qtd}</td>
                    <td>${fmt(d.rec)}</td>
                    <td style="color:${d.luc < 0 ? 'var(--delete)' : 'var(--success)'}">${fmt(d.luc)}</td>
                </tr>`;
            }
        } else {
            html = `<table><thead><tr><th>Data</th><th>Produto</th><th>Total</th><th>Lucro</th></tr></thead><tbody>`;
            snap.forEach(doc => {
                const v = doc.data();
                if((ini && v.data < ini) || (fim && v.data > fim)) return;

                const tRec = v.precoUn * v.qtd;
                const tCus = v.custoUn * v.qtd;
                const tLuc = tRec - tCus;
                rec += tRec; cus += tCus;

                html += `<tr>
                    <td>${v.data.split('-').reverse().join('/')}</td>
                    <td>${v.prodNome} (${v.qtd}x)</td>
                    <td>${fmt(tRec)}</td>
                    <td style="color:${tLuc < 0 ? 'var(--delete)' : 'var(--success)'}">${fmt(tLuc)}</td>
                </tr>`;
            });
        }

        document.getElementById('res-rec').innerText = fmt(rec);
        document.getElementById('res-cus').innerText = fmt(cus);
        document.getElementById('res-luc').innerText = fmt(rec - cus);
        document.getElementById('listagem-vendas').innerHTML = html + `</tbody></table>`;
    };

    window.removerItem = async (col, id) => {
        if(confirm("Deseja excluir permanentemente?")) {
            await deleteDoc(doc(db, col, id));
        }
    };
</script>

</body>
</html>
