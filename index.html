<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breve Deleite - Controle</title>
    <link rel="icon" href="favicao.png" type="image/png">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --primary: #FBBF24; --success: #4ADE80; --bg: #823B28; 
            --surface: #9B4630; --text: #FFF0C9; --border: #6B291A; 
            --edit: #38BDF8; --delete: #FCA5A5;
        }
        body { font-family: system-ui, -apple-system, sans-serif; margin: 0; padding: 20px; background: var(--bg); color: var(--text); }
        .container { max-width: 900px; margin: auto; background: var(--surface); padding: 25px; border-radius: 12px; box-shadow: 0 10px 20px -5px rgba(0,0,0,0.4); }
        .header-logo { text-align: center; margin-bottom: 25px; }
        .header-logo img { width: 250px; height: auto; display: block; margin: 0 auto; aspect-ratio: 1033 / 537; object-fit: contain; }
        .header-logo h2 { margin: 10px 0 0; font-size: 16px; letter-spacing: 4px; color: var(--text); opacity: 0.9; font-weight: bold; }
        
        .tabs { display: flex; gap: 8px; margin-bottom: 25px; border-bottom: 2px solid var(--border); padding-bottom: 10px; overflow-x: auto; }
        .tab { padding: 10px 18px; cursor: pointer; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; font-weight: 600; white-space: nowrap; transition: 0.2s; color: var(--text); }
        .tab.active { background: var(--primary); color: var(--bg); border-color: var(--primary); }
        
        .section { display: none; }
        .section.active { display: block; }
        
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 20px; background: rgba(0,0,0,0.15); padding: 15px; border-radius: 8px; border: 1px solid var(--border); }
        .form-group { display: flex; flex-direction: column; gap: 4px; }
        label { font-size: 12px; font-weight: bold; color: rgba(255, 240, 201, 0.7); }
        input, select { padding: 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 15px; background: var(--bg); color: var(--text); color-scheme: dark; }
        
        button.btn-action { background: var(--success); color: var(--bg); border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.2s; text-transform: uppercase; }
        
        .table-container { overflow-x: auto; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; background: var(--surface); }
        th, td { padding: 12px; border-bottom: 1px solid var(--border); text-align: left; font-size: 14px; }
        th { background: rgba(0,0,0,0.2); color: var(--text); }
        
        .chart-container { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 8px; margin-top: 20px; display: none; }

        .summary-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin: 20px 0; }
        .card { padding: 15px; background: var(--bg); border-radius: 8px; text-align: center; border: 1px solid var(--border); }
        .card h3 { margin: 0; font-size: 11px; color: rgba(255, 240, 201, 0.7); text-transform: uppercase; }
        .card p { margin: 5px 0 0; font-size: 18px; font-weight: bold; }

        .btn-del { color: var(--delete); background: none; border: none; cursor: pointer; }
    </style>
</head>
<body>
<div class="container">
    <div class="header-logo"><img src="brevelogo.png" alt="Logo"><h2>CONTROLE</h2></div>
    
    <div class="tabs">
        <button class="tab active" onclick="showTab('produtos', this)">📦 Produtos</button>
        <button class="tab" onclick="showTab('vendas', this)">🛒 Vender</button>
        <button class="tab" onclick="showTab('relatorios', this)">📊 Relatórios</button>
    </div>

    <div id="produtos" class="section active">
        <h3>Cadastrar Produto</h3>
        <form id="form-produto" class="form-grid">
            <input type="hidden" id="p-id">
            <div class="form-group"><label>Nome</label><input type="text" id="p-nome" required></div>
            <div class="form-group"><label>Custo (R$)</label><input type="number" id="p-custo" step="0.01" required></div>
            <div class="form-group"><label>Preço Sugerido (R$)</label><input type="number" id="p-preco" step="0.01" required></div>
            <div class="form-group"><label>&nbsp;</label><button type="submit" class="btn-action">Salvar</button></div>
        </form>
        <div id="listagem-produtos" class="table-container"></div>
    </div>

    <div id="vendas" class="section">
        <h3>Lançar Venda</h3>
        <form id="form-venda" class="form-grid">
            <div class="form-group"><label>Data</label><input type="date" id="v-data" required></div>
            <div class="form-group"><label>Produto</label><select id="v-prod" onchange="setPrecoSugerido()" required></select></div>
            <div class="form-group"><label>Qtd</label><input type="number" id="v-qtd" min="1" value="1" required></div>
            <div class="form-group"><label>Preço Venda (R$)</label><input type="number" id="v-preco" step="0.01" required></div>
            <div class="form-group"><label>&nbsp;</label><button type="submit" class="btn-action">Confirmar Venda</button></div>
        </form>
        <div id="listagem-vendas-recente" class="table-container"></div>
    </div>

    <div id="relatorios" class="section">
        <div class="form-grid">
            <div class="form-group"><label>Início</label><input type="date" id="r-ini"></div>
            <div class="form-group"><label>Fim</label><input type="date" id="r-fim"></div>
            <div class="form-group"><label>&nbsp;</label><button onclick="carregarRelatorio(false)" class="btn-action">Por Venda</button></div>
            <div class="form-group"><label>&nbsp;</label><button onclick="carregarRelatorioPico()" class="btn-action" style="background:var(--primary); color:var(--bg)">Pico por Dia</button></div>
        </div>

        <div class="summary-cards">
            <div class="card"><h3>Receita</h3><p id="res-rec">R$ 0,00</p></div>
            <div class="card"><h3>Custo Total</h3><p id="res-cus">R$ 0,00</p></div>
            <div class="card" style="border-top:4px solid var(--success)"><h3>Lucro</h3><p id="res-luc">R$ 0,00</p></div>
        </div>

        <div id="pico-chart-wrapper" class="chart-container">
            <canvas id="picoChart"></canvas>
        </div>

        <div id="listagem-vendas" class="table-container"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, orderBy, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyB861qyg_6svQUqrd069ZPAfPH6ZRWbBCs", 
        authDomain: "breve-deleite.firebaseapp.com", 
        projectId: "breve-deleite", 
        storageBucket: "breve-deleite.firebasestorage.app", 
        messagingSenderId: "271773334620", 
        appId: "1:271773334620:web:3d50bdc91efda9aa8efa99" 
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let cacheProdutos = [], meuGrafico = null;
    const fmt = (v) => Number(v).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

    // Navegação de Tabs
    window.showTab = (id, btn) => {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
        if(id === 'vendas') popularSelect();
    };

    // Monitorar Produtos
    onSnapshot(collection(db, "produtos"), (snap) => {
        cacheProdutos = snap.docs.map(d => ({id: d.id, ...d.data()}));
        let html = `<table><thead><tr><th>Produto</th><th>Preço</th><th>Ação</th></tr></thead><tbody>`;
        cacheProdutos.forEach(p => {
            html += `<tr><td>${p.nome}</td><td>${fmt(p.preco)}</td><td><button class="btn-del" onclick="window.removerItem('produtos','${p.id}')">✖</button></td></tr>`;
        });
        document.getElementById('listagem-produtos').innerHTML = html + `</tbody></table>`;
    });

    function popularSelect() {
        const sel = document.getElementById('v-prod');
        sel.innerHTML = '<option value="">Selecione...</option>';
        cacheProdutos.forEach(p => sel.innerHTML += `<option value="${p.id}">${p.nome}</option>`);
        document.getElementById('v-data').valueAsDate = new Date();
    }

    window.setPrecoSugerido = () => {
        const p = cacheProdutos.find(x => x.id === document.getElementById('v-prod').value);
        if(p) document.getElementById('v-preco').value = p.preco;
    };

    // Salvar Venda
    document.getElementById('form-venda').onsubmit = async (e) => {
        e.preventDefault();
        const p = cacheProdutos.find(x => x.id === document.getElementById('v-prod').value);
        await addDoc(collection(db, "vendas"), {
            data: document.getElementById('v-data').value,
            prodNome: p.nome, custoUn: p.custo,
            precoUn: parseFloat(document.getElementById('v-preco').value),
            qtd: parseInt(document.getElementById('v-qtd').value),
            timestamp: new Date().getTime()
        });
        e.target.reset(); popularSelect();
    };

    // Relatório de Pico por Dia da Semana
    window.carregarRelatorioPico = async () => {
        const ini = document.getElementById('r-ini').value;
        const fim = document.getElementById('r-fim').value;
        const snap = await getDocs(collection(db, "vendas"));
        
        const diasNome = ["Domingo", "Segunda", "Terça", "Quarta", "Quinta", "Sexta", "Sábado"];
        const dadosPico = [0, 0, 0, 0, 0, 0, 0]; // Soma de R$
        const qtdVendas = [0, 0, 0, 0, 0, 0, 0]; // Contagem de pedidos
        
        let totalGeral = 0;

        snap.forEach(doc => {
            const v = doc.data();
            if((ini && v.data < ini) || (fim && v.data > fim)) return;
            
            // Corrige fuso horário da data para pegar o dia da semana certo
            const dataObj = new Date(v.data + "T00:00:00");
            const diaSemana = dataObj.getDay();
            
            const valorVenda = v.precoUn * v.qtd;
            dadosPico[diaSemana] += valorVenda;
            qtdVendas[diaSemana] += 1;
            totalGeral += valorVenda;
        });

        // Exibe o container do gráfico
        document.getElementById('pico-chart-wrapper').style.display = 'block';
        
        // Destrói gráfico anterior se existir
        if(meuGrafico) meuGrafico.destroy();

        const ctx = document.getElementById('picoChart').getContext('2d');
        meuGrafico = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: diasNome,
                datasets: [{
                    label: 'Faturamento por Dia (R$)',
                    data: dadosPico,
                    backgroundColor: '#FBBF24',
                    borderRadius: 5
                }]
            },
            options: {
                responsive: true,
                scales: { 
                    y: { beginAtZero: true, grid: { color: '#6B291A' }, ticks: { color: '#FFF0C9' } },
                    x: { ticks: { color: '#FFF0C9' } }
                },
                plugins: { legend: { display: false } }
            }
        });

        // Mostra os dados em tabela logo abaixo
        let htmlTable = `<h3>Dados por Dia</h3><table><thead><tr><th>Dia</th><th>Vendas</th><th>Total</th></tr></thead><tbody>`;
        diasNome.forEach((dia, i) => {
            htmlTable += `<tr><td>${dia}</td><td>${qtdVendas[i]}</td><td>${fmt(dadosPico[i])}</td></tr>`;
        });
        document.getElementById('listagem-vendas').innerHTML = htmlTable + "</tbody></table>";
        document.getElementById('res-rec').innerText = fmt(totalGeral);
    };

    // Relatório Padrão (Por Venda)
    window.carregarRelatorio = async () => {
        document.getElementById('pico-chart-wrapper').style.display = 'none';
        const ini = document.getElementById('r-ini').value, fim = document.getElementById('r-fim').value;
        const snap = await getDocs(query(collection(db, "vendas"), orderBy("data", "desc")));
        let rec = 0, cus = 0, html = "<table><thead><tr><th>Data</th><th>Produto</th><th>Total</th></tr></thead><tbody>";
        
        snap.forEach(doc => {
            const v = doc.data();
            if((ini && v.data < ini) || (fim && v.data > fim)) return;
            const tr = v.precoUn * v.qtd, tc = v.custoUn * v.qtd;
            rec += tr; cus += tc;
            html += `<tr><td>${v.data.split('-').reverse().join('/')}</td><td>${v.prodNome}</td><td>${fmt(tr)}</td></tr>`;
        });
        document.getElementById('res-rec').innerText = fmt(rec);
        document.getElementById('res-cus').innerText = fmt(cus);
        document.getElementById('res-luc').innerText = fmt(rec-cus);
        document.getElementById('listagem-vendas').innerHTML = html + "</tbody></table>";
    };

    window.removerItem = async (c, id) => { if(confirm("Excluir?")) await deleteDoc(doc(db, c, id)); };
</script>
</body>
</html>
