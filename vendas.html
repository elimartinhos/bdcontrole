<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Breve Deleite - App</title>
    <link rel="icon" href="favicao.png" type="image/png">
    <style>
        :root { 
            --primary: #FBBF24; 
            --bg: #823B28; 
            --surface: #9B4630; 
            --text: #FFF0C9; 
            --border: #6B291A; 
            --delete: #FCA5A5;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        html, body { 
            height: 100%; 
            margin: 0; 
            padding: 0; 
            font-family: system-ui, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            overflow: hidden; 
        }
        
        .app-container { 
            display: flex; 
            flex-direction: column; 
            height: 100dvh; /* Dynamic Viewport Height para mobile */
            padding: 15px; 
        }

        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            flex: 0 0 auto; 
            margin-bottom: 10px; 
        }
        .header img { height: 40px; width: auto; }
        
        .btn-history { 
            background: var(--surface); 
            border: 2px solid var(--border); 
            color: var(--text); 
            border-radius: 50%; 
            width: 50px; 
            height: 50px; 
            font-size: 22px; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }

        .main-form { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
            justify-content: flex-start;
            overflow: hidden;
        }

        .input-group { display: flex; flex-direction: column; flex: 1.2; max-height: 25%; }
        
        select#v-prod { 
            height: 100%; width: 100%; border: 3px solid var(--border); border-radius: 15px; 
            background: var(--surface); color: var(--text); font-size: 22px; font-weight: 900;
            text-align: center; text-align-last: center; appearance: none;
            line-height: 1.1; padding: 10px;
        }

        .row { display: flex; gap: 10px; flex: 1.5; }

        .qty-container { flex: 1; display: flex; background: var(--surface); border: 3px solid var(--border); border-radius: 15px; overflow: hidden; }
        .qty-num { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 45px; font-weight: 900; border-right: 2px solid var(--border); }
        .qty-btns { flex: 0.8; display: flex; flex-direction: column; }
        .qty-btns button { flex: 1; border: none; background: transparent; color: var(--text); font-size: 35px; font-weight: bold; cursor: pointer; }
        .qty-btns button:first-child { border-bottom: 2px solid var(--border); }

        .price-container { flex: 1; display: flex; flex-direction: column; background: var(--surface); border: 3px solid var(--border); border-radius: 15px; padding: 5px; }
        .price-label { font-size: 12px; font-weight: bold; text-align: center; opacity: 0.8; }
        .price-input-wrapper { flex: 1; display: flex; align-items: center; justify-content: center; }
        .price-input-wrapper span { font-size: 22px; font-weight: bold; margin-right: 4px; color: var(--text); }
        .price-input-wrapper input { background: transparent; border: none; color: var(--text); font-size: 32px; font-weight: 900; width: 100%; text-align: center; outline: none; }

        /* Botão LANÇAR com as mesmas cores dos painéis */
        .btn-submit { 
            flex: 0 0 auto; 
            background: var(--surface); 
            color: var(--text); 
            border: 3px solid var(--border); 
            padding: 22px; 
            border-radius: 15px; 
            font-size: 28px; 
            font-weight: 900; 
            cursor: pointer; 
            box-shadow: 0 6px 0 var(--border); 
            margin-top: 10px;
            text-transform: uppercase;
        }
        .btn-submit:active { transform: translateY(4px); box-shadow: 0 2px 0 var(--border); }

        /* Modal Histórico */
        .modal { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: none; flex-direction: column; z-index: 10; }
        .modal.active { display: flex; }
        .history-list { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .history-item { background: var(--surface); padding: 15px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); }
        .btn-close-large { background: var(--primary); color: var(--bg); border: none; padding: 25px; font-size: 20px; font-weight: 900; width: 100%; text-transform: uppercase; }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <img src="breveapp.png" alt="Logo">
        <button class="btn-history" onclick="toggleHistory(true)">🕒</button>
    </div>
    
    <form id="form-venda" class="main-form">
        <input type="date" id="v-data" style="display:none">
        
        <div class="input-group">
            <select id="v-prod" onchange="setPrecoSugerido()" required>
                <option value="">SELECIONE&#10;O&#10;PRODUTO</option>
            </select>
        </div>

        <div class="row">
            <div class="qty-container">
                <div class="qty-num" id="qty-display">1</div>
                <div class="qty-btns">
                    <button type="button" onclick="changeQty(1)">+</button>
                    <button type="button" onclick="changeQty(-1)">-</button>
                </div>
            </div>
            <div class="price-container">
                <div class="price-label">VALOR TOTAL</div>
                <div class="price-input-wrapper">
                    <span>R$</span>
                    <input type="number" id="v-preco" step="0.01" required>
                </div>
            </div>
        </div>

        <button type="submit" class="btn-submit">LANÇAR</button>
    </form>

    <div id="modal-history" class="modal">
        <div style="padding:15px; text-align:center; border-bottom: 2px solid var(--border)"><h2>HISTÓRICO RECENTE</h2></div>
        <div class="history-list" id="listagem-history"></div>
        <button class="btn-close-large" onclick="toggleHistory(false)">VOLTAR</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, deleteDoc, doc, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyB861qyg_6svQUqrd069ZPAfPH6ZRWbBCs", 
        authDomain: "breve-deleite.firebaseapp.com", 
        projectId: "breve-deleite", 
        storageBucket: "breve-deleite.firebasestorage.app", 
        messagingSenderId: "271773334620", 
        appId: "1:271773334620:web:3d50bdc91efda9aa8efa99" 
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let cacheProds = [], currentQty = 1;

    document.getElementById('v-data').valueAsDate = new Date();

    onSnapshot(collection(db, "produtos"), (snap) => {
        cacheProds = snap.docs.map(d => ({id: d.id, ...d.data()}));
        const sel = document.getElementById('v-prod');
        sel.innerHTML = '<option value="">SELECIONE&#10;O&#10;PRODUTO</option>';
        cacheProds.sort((a,b) => a.nome.localeCompare(b.nome)).forEach(p => {
            sel.innerHTML += `<option value="${p.id}">${p.nome.toUpperCase()}</option>`;
        });
    });

    window.changeQty = (v) => {
        currentQty = Math.max(1, currentQty + v);
        document.getElementById('qty-display').innerText = currentQty;
        setPrecoSugerido();
    };

    window.setPrecoSugerido = () => {
        const p = cacheProds.find(x => x.id === document.getElementById('v-prod').value);
        if(p) document.getElementById('v-preco').value = (p.preco * currentQty).toFixed(2);
    };

    document.getElementById('form-venda').onsubmit = async (e) => {
        e.preventDefault();
        const p = cacheProds.find(x => x.id === document.getElementById('v-prod').value);
        const btn = document.querySelector('.btn-submit');
        btn.innerText = "GRAVANDO..."; btn.disabled = true;

        await addDoc(collection(db, "vendas"), {
            data: document.getElementById('v-data').value,
            prodNome: p.nome, 
            custoUn: p.custo,
            precoUn: parseFloat(document.getElementById('v-preco').value) / currentQty,
            qtd: currentQty,
            timestamp: new Date().getTime()
        });
        
        window.location.reload();
    };

    window.toggleHistory = (s) => document.getElementById('modal-history').classList.toggle('active', s);

    const q = query(collection(db, "vendas"), orderBy("timestamp", "desc"), limit(20));
    onSnapshot(q, (snap) => {
        let html = "";
        snap.forEach(doc => {
            const v = doc.data();
            const total = (v.precoUn * v.qtd).toLocaleString('pt-BR', {style:'currency', currency:'BRL'});
            html += `<div class="history-item">
                <div><strong>${v.prodNome} (${v.qtd}x)</strong><br><small>${total}</small></div>
                <button style="background:var(--delete); border:none; padding:12px; border-radius:8px; font-weight:bold; color:#823B28" onclick="window.delVenda('${doc.id}')">✖</button>
            </div>`;
        });
        document.getElementById('listagem-history').innerHTML = html || "<p style='text-align:center'>Sem vendas recentes.</p>";
    });

    window.delVenda = async (id) => { if(confirm("Deseja apagar esta venda?")) await deleteDoc(doc(db, "vendas", id)); };
</script>
</body>
</html>
